  </defs>
  <!-- Left bracket -->
  <rect x="6"  y="8"  width="3" height="30" fill="url(#bg)"/>
  <rect x="6"  y="8"  width="10" height="3"  fill="url(#bg)"/>
  <rect x="6"  y="35" width="10" height="3"  fill="url(#bg)"/>
  <!-- Right bracket -->
  <rect x="55" y="8"  width="3" height="30" fill="url(#bg)"/>
  <rect x="48" y="8"  width="10" height="3"  fill="url(#bg)"/>
  <rect x="48" y="35" width="10" height="3"  fill="url(#bg)"/>
  <!-- D -->
  <text x="32" y="37" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="28" fill="white" text-anchor="middle">D</text>
  <!-- RADAR -->
  <text x="9" y="54" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="url(#rg)" letter-spacing="4.5">RADAR</text>
